name: plan
description: Research the codebase and planning docs, produce a detailed implementation plan without writing code

nodes:
  research:
    prompt: |
      Task: $ARGUMENTS

      Research thoroughly before planning:
      1. Read .planning/STATE.md, .planning/ROADMAP.md, .planning/REQUIREMENTS.md
      2. Find all relevant existing code (search for related files, types, API routes)
      3. Check the open GitHub issues: gh issue list --state open
      4. Identify what already exists vs what needs to be built

  plan:
    depends_on: [research]
    prompt: |
      Research findings:
      $research.output

      Write a detailed implementation plan for: $ARGUMENTS

      Structure:
      ## Overview
      What this builds and why it fits the roadmap

      ## Files to Create
      List each new file with its purpose and key exports

      ## Files to Modify
      List each existing file with exactly what changes

      ## Data Model
      Any new Supabase tables or changes to existing schema

      ## API Routes
      Any new Next.js API routes needed

      ## Components
      UI components to build, with rough prop shapes

      ## Testing
      How to verify the feature works (manual steps + unit tests)

      ## Risks & Open Questions
      Anything uncertain that needs a decision before coding

      Save the plan to .planning/plans/$(date +%Y%m%d)-$ARGUMENTS.md (slugified)
