services:
  geomode-companion:
    build:
      context: ./services/geomode-companion
    env_file:
      - ./services/geomode-companion/.env
    depends_on:
      - postgres
    restart: unless-stopped
    ports:
      - "8787:8787"

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - geomode-companion
